<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMD World Cup Bracket — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f7f5;--surface:#ffffff;--surface2:#eef2ee;--border:#c8d8c8;
  --accent:#1b7a2b;--accent2:#15611f;--gold:#d4a017;--silver:#7a8a7a;
  --text:#1a2e1a;--dim:#5a7a5a;--green:#1b7a2b;--green-bg:rgba(27,122,43,.08);
  --red:#d32f2f;--orange:#e67e22;
}
body{background:var(--bg);background-image:repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(27,122,43,.03) 60px,rgba(27,122,43,.03) 120px);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
h1,h2,h3,.section-title,.nav-btn,.btn{font-family:'Oswald',sans-serif}

.header{text-align:center;padding:28px 16px 0;position:relative}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--gold),var(--accent),transparent)}
.header h1{font-size:clamp(24px,4vw,40px);font-weight:700;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(90deg,var(--accent),var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:12px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.admin-badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:700;background:rgba(46,204,113,.2);color:var(--accent);margin-left:8px;letter-spacing:1px}

.nav{display:flex;justify-content:center;gap:4px;padding:16px 8px 14px;flex-wrap:wrap}
.nav-btn{padding:8px 18px;background:var(--surface);border:1px solid var(--border);color:var(--dim);cursor:pointer;font-size:13px;font-weight:600;letter-spacing:1.5px;border-radius:4px;transition:all .15s;text-transform:uppercase}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

.container{max-width:1100px;margin:0 auto;padding:20px 16px}
.view{display:none}.view.active{display:block}

.section-title{font-size:20px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;text-align:center}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card h3{font-size:16px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.card-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid rgba(27,122,43,.3)}
.card-row:last-child{border-bottom:none}

/* Forms */
input,select{padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none}
input:focus,select:focus{border-color:var(--gold)}
.btn{padding:8px 20px;border:none;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .15s}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:var(--accent2)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#17a34a}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{background:var(--surface2)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-small{padding:5px 12px;font-size:11px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.stat-card .number{font-size:32px;font-weight:700;font-family:'Oswald',sans-serif;color:var(--gold)}
.stat-card .label{font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-top:2px}

/* Deadline */
.deadline-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;text-align:center;margin-bottom:20px}
.deadline-box .current{font-size:14px;margin-bottom:12px}
.deadline-box .current strong{color:var(--gold)}
.deadline-box .no-deadline{color:var(--dim);font-style:italic}
.deadline-row{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap}

/* Results entry */
.group-results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.group-result-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.group-result-hdr{background:linear-gradient(135deg,#1b7a2b,#2e8b3e);padding:8px 14px;font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#fff}
.result-team-row{display:flex;align-items:center;gap:8px;padding:6px 14px;border-bottom:1px solid rgba(27,122,43,.3);font-size:13px}
.result-team-row:last-child{border-bottom:none}
.pos-select{width:50px;padding:4px 6px;font-size:12px;text-align:center}
.pos-badge{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.p1{background:var(--gold);color:#fff}.p2{background:var(--silver);color:#fff}.p3{background:#b0c4b0;color:#3a5a3a}.p4{background:#d4e0d4;color:#6a8a6a}
.saved-indicator{font-size:10px;color:var(--green);margin-left:auto;font-weight:600}

/* Knockout results */
.ko-results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.ko-result-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.ko-match-label{font-size:10px;color:var(--dim);letter-spacing:1px;padding:4px 10px;background:rgba(27,122,43,.06);text-transform:uppercase;font-weight:600}
.ko-team-btn{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;font-size:13px;cursor:pointer;border-bottom:1px solid rgba(27,122,43,.25);transition:all .12s}
.ko-team-btn:last-child{border-bottom:none}
.ko-team-btn:hover{background:rgba(27,122,43,.06)}
.ko-team-btn.winner{background:var(--green-bg);color:var(--gold);font-weight:700}
.ko-team-btn.tbd{cursor:default;color:var(--dim);font-style:italic}
.check{background:var(--green);color:#fff;border-radius:3px;padding:1px 7px;font-size:11px;font-weight:800}

/* Leaderboard */
.lb-table{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.lb-th{display:grid;grid-template-columns:40px 1fr 70px 90px;padding:8px 16px;font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--border)}
.lb-row{display:grid;grid-template-columns:40px 1fr 70px 90px;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(27,122,43,.3);cursor:pointer;transition:background .1s}
.lb-row:hover{background:var(--surface2)}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-weight:800}
.r1{font-size:18px;color:var(--gold)}.r2{font-size:18px;color:var(--silver)}.r3{font-size:18px;color:#cd7f32}.rn{font-size:14px;color:var(--dim)}
.lb-name{font-weight:600;font-size:14px}
.lb-score{font-weight:700;color:var(--gold);font-size:16px;font-family:'Oswald',sans-serif}
.lb-champ{text-align:right;font-size:12px;color:var(--dim)}

/* Viewer */
.viewer-card{margin-top:20px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px}
.viewer-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.viewer-round{margin-bottom:12px}
.viewer-round-title{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-family:'Oswald',sans-serif}
.picks-wrap{display:flex;flex-wrap:wrap;gap:5px}
.pick-chip{padding:3px 8px;background:var(--surface2);border-radius:4px;font-size:12px}
.pick-chip.correct{background:var(--green-bg);color:var(--green);border:1px solid rgba(29,185,84,.3)}
.pick-chip.wrong{opacity:.4;text-decoration:line-through}

/* Round tabs */
.round-tabs{display:flex;justify-content:center;gap:3px;padding:12px 8px;flex-wrap:wrap}
.tab-btn{padding:5px 14px;background:transparent;border:1px solid transparent;color:var(--dim);cursor:pointer;font-size:12px;font-weight:600;letter-spacing:1px;border-radius:4px;text-transform:uppercase;transition:all .12s;font-family:'Oswald',sans-serif}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{background:var(--surface2);border-color:var(--gold);color:var(--gold)}

.final-card{border:2px solid var(--gold)!important;box-shadow:0 0 20px rgba(245,200,66,.1)}

.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:10px 20px;border-radius:6px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}

@media(max-width:600px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .group-results-grid{grid-template-columns:1fr}
  .ko-results-grid{grid-template-columns:1fr 1fr}
  .lb-th,.lb-row{grid-template-columns:36px 1fr 50px 70px}
}
</style>
</head>
<body>

<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════
const GROUPS = {
  A:["Mexico","South Korea","South Africa","Czechia"],
  B:["Canada","Switzerland","Qatar","Bosnia-Herzegovina"],
  C:["Brazil","Morocco","Scotland","Haiti"],
  D:["USA","Paraguay","Australia","Turkiye"],
  E:["Germany","Ecuador","Ivory Coast","Curacao"],
  F:["Netherlands","Japan","Tunisia","Sweden"],
  G:["Belgium","Iran","Egypt","New Zealand"],
  H:["Spain","Uruguay","Saudi Arabia","Cape Verde"],
  I:["France","Senegal","Norway","Iraq"],
  J:["Argentina","Austria","Algeria","Jordan"],
  K:["Portugal","Colombia","Uzbekistan","DR Congo"],
  L:["England","Croatia","Panama","Ghana"],
};

const FLAGS = {
  "Mexico":"🇲🇽","South Korea":"🇰🇷","South Africa":"🇿🇦","Czechia":"🇨🇿",
  "Canada":"🇨🇦","Switzerland":"🇨🇭","Qatar":"🇶🇦","Bosnia-Herzegovina":"🇧🇦",
  "Brazil":"🇧🇷","Morocco":"🇲🇦","Scotland":"🇬🇧","Haiti":"🇭🇹",
  "USA":"🇺🇸","Paraguay":"🇵🇾","Australia":"🇦🇺","Turkiye":"🇹🇷",
  "Germany":"🇩🇪","Ecuador":"🇪🇨","Ivory Coast":"🇨🇮","Curacao":"🇨🇼",
  "Netherlands":"🇳🇱","Japan":"🇯🇵","Tunisia":"🇹🇳","Sweden":"🇸🇪",
  "Belgium":"🇧🇪","Iran":"🇮🇷","Egypt":"🇪🇬","New Zealand":"🇳🇿",
  "Spain":"🇪🇸","Uruguay":"🇺🇾","Saudi Arabia":"🇸🇦","Cape Verde":"🇨🇻",
  "France":"🇫🇷","Senegal":"🇸🇳","Norway":"🇳🇴","Iraq":"🇮🇶",
  "Argentina":"🇦🇷","Austria":"🇦🇹","Algeria":"🇩🇿","Jordan":"🇯🇴",
  "Portugal":"🇵🇹","Colombia":"🇨🇴","Uzbekistan":"🇺🇿","DR Congo":"🇨🇩",
  "England":"🇬🇧","Croatia":"🇭🇷","Panama":"🇵🇦","Ghana":"🇬🇭",
};

const R32_STRUCT = [
  ["A1","C3"],["B1","A3"],["C1","B2"],["D1","E3"],
  ["E1","D2"],["F1","D3"],["A2","C2"],["B2","F3"],
  ["G1","I3"],["H1","G3"],["I1","H2"],["J1","K3"],
  ["K1","J2"],["L1","J3"],["G2","I2"],["H2","L3"],
];

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let st = {
  page: "overview",
  resultsRound: "groups",
  results: { groups:{}, r32:{}, r16:{}, qf:{}, sf:{}, final:null },
  deadline: null,
  leaderboard: [],
  viewingUser: null,
  loading: true,
};

// ══════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════
async function sGet(k,sh){try{const r=await window.storage.get(k,sh);return r?.value||null}catch(e){return null}}
async function sSet(k,v,sh){try{await window.storage.set(k,v,sh)}catch(e){}}
async function sList(p,sh){try{const r=await window.storage.list(p,sh);return r?.keys||[]}catch(e){return[]}}
async function sDel(k,sh){try{await window.storage.delete(k,sh)}catch(e){}}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

// ══════════════════════════════════════════
// SCORING
// ══════════════════════════════════════════
function scoreBracket(bracket) {
  const res = st.results;
  let score = 0;
  // Score group predictions: 1 point per team in the correct position
  Object.keys(res.groups).forEach(g => {
    const actual = res.groups[g]; // array of teams in final order
    const predicted = bracket.groups?.[g];
    if (!actual || !predicted) return;
    for (let i = 0; i < actual.length; i++) {
      if (predicted[i] === actual[i]) score++;
    }
  });
  // Score knockout: 1 point per correct winner
  ["r32","r16","qf","sf"].forEach(round => {
    const actualPicks = res[round] || {};
    const userPicks = bracket[round] || {};
    Object.keys(actualPicks).forEach(matchId => {
      if (userPicks[matchId] === actualPicks[matchId]) score++;
    });
  });
  // Final
  if (res.final && bracket.final === res.final) score++;
  return score;
}

async function refreshLeaderboard() {
  const keys = await sList("wc26_bracket:", true);
  const entries = [];
  for (const key of keys) {
    const val = await sGet(key, true);
    if (val) {
      const b = JSON.parse(val);
      const name = key.replace("wc26_bracket:","");
      entries.push({ name, bracket: b, score: scoreBracket(b) });
    }
  }
  entries.sort((a,b) => b.score - a.score);
  st.leaderboard = entries;
}

// ══════════════════════════════════════════
// RESULTS LOGIC
// ══════════════════════════════════════════
function deriveR32ActualTeams() {
  const gp = st.results.groups;
  return R32_STRUCT.map(([c1,c2]) => {
    const t1 = gp[c1[0]]?.[parseInt(c1[1])-1] || "TBD";
    const t2 = gp[c2[0]]?.[parseInt(c2[1])-1] || "TBD";
    return [t1, t2];
  });
}

function getActualKOMatchups(round) {
  if (round === "r32") return deriveR32ActualTeams();
  const prev = round==="r16"?"r32":round==="qf"?"r16":round==="sf"?"qf":null;
  if (!prev) return [];
  const prevPicks = st.results[prev] || {};
  const prevCount = round==="r16"?16:round==="qf"?8:round==="sf"?4:2;
  const matchups = [];
  for (let i = 0; i < prevCount; i += 2) {
    matchups.push([prevPicks[`${prev}_${i}`]||"TBD", prevPicks[`${prev}_${i+1}`]||"TBD"]);
  }
  return matchups;
}

function getActualFinalMatchup() {
  const s = st.results.sf || {};
  return [s["sf_0"]||"TBD", s["sf_1"]||"TBD"];
}

async function saveResults() {
  await sSet("wc26_results", JSON.stringify(st.results), true);
  await refreshLeaderboard();
  toast("Results saved & scores updated!");
}

async function saveDeadline() {
  await sSet("wc26_deadline", st.deadline || "", true);
  toast("Deadline saved!");
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render() {
  const app = document.getElementById("app");
  if (st.loading) {
    app.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column"><div style="font-size:48px">⚙️</div><div style="color:var(--dim);letter-spacing:2px;text-transform:uppercase;font-size:13px;margin-top:12px">Loading admin dashboard...</div></div>`;
    return;
  }

  let html = `
  <div class="header">
    <h1>MMD World Cup Bracket<span class="admin-badge">ADMIN</span></h1>
    <div class="sub">Manage results, deadlines & scores</div>
  </div>
  <div class="nav">
    <button class="nav-btn ${st.page==='overview'?'active':''}" onclick="navTo('overview')">Overview</button>
    <button class="nav-btn ${st.page==='results'?'active':''}" onclick="navTo('results')">Enter Results</button>
    <button class="nav-btn ${st.page==='brackets'?'active':''}" onclick="navTo('brackets')">All Brackets</button>
    <button class="nav-btn ${st.page==='leaderboard'?'active':''}" onclick="navTo('leaderboard')">Leaderboard</button>
  </div>
  <div class="container">`;

  if (st.page === "overview") html += renderOverview();
  else if (st.page === "results") html += renderResults();
  else if (st.page === "brackets") html += renderBrackets();
  else if (st.page === "leaderboard") html += renderLeaderboardView();

  html += '</div>';
  app.innerHTML = html;
}

function renderOverview() {
  const lb = st.leaderboard;
  const totalPlayers = lb.length;
  const resultsEntered = Object.keys(st.results.r32||{}).length + Object.keys(st.results.r16||{}).length + Object.keys(st.results.qf||{}).length + Object.keys(st.results.sf||{}).length + (st.results.final?1:0);
  const groupsDone = Object.keys(st.results.groups||{}).length;

  // Most picked champions
  const champCounts = {};
  lb.forEach(e => { if(e.bracket?.final) champCounts[e.bracket.final] = (champCounts[e.bracket.final]||0)+1; });
  const topChamps = Object.entries(champCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);

  let html = `
  <div class="stats-grid">
    <div class="stat-card"><div class="number">${totalPlayers}</div><div class="label">Participants</div></div>
    <div class="stat-card"><div class="number">${groupsDone}/12</div><div class="label">Groups Finalized</div></div>
    <div class="stat-card"><div class="number">${resultsEntered}/31</div><div class="label">KO Results Entered</div></div>
    <div class="stat-card"><div class="number">${lb[0]?.score||0}</div><div class="label">Top Score</div></div>
  </div>

  <div class="deadline-box">
    <h3 style="font-family:'Oswald';color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">Submission Deadline</h3>
    <div class="current">${st.deadline ? `Deadline: <strong>${new Date(st.deadline).toLocaleString()}</strong>` : '<span class="no-deadline">No deadline set — players can submit anytime</span>'}</div>
    <div class="deadline-row">
      <input type="datetime-local" id="deadlineInput" value="${st.deadline||''}" style="font-size:13px"/>
      <button class="btn btn-green btn-small" onclick="st.deadline=document.getElementById('deadlineInput').value;saveDeadline();render()">Set Deadline</button>
      ${st.deadline ? `<button class="btn btn-outline btn-small" onclick="st.deadline=null;saveDeadline();render()">Clear</button>` : ''}
    </div>
  </div>`;

  if (topChamps.length > 0) {
    html += `<div class="card"><h3>Most Picked Champions</h3>`;
    topChamps.forEach(([team, count]) => {
      const pct = Math.round(count / totalPlayers * 100);
      html += `<div class="card-row"><span>${FLAGS[team]||''} ${esc(team)}</span><span style="margin-left:auto;color:var(--gold);font-weight:700">${count}</span><span style="color:var(--dim);font-size:12px;margin-left:4px">(${pct}%)</span>
        <div style="flex-basis:100%;height:4px;background:var(--surface2);border-radius:2px;margin-top:4px"><div style="height:4px;border-radius:2px;background:var(--gold);width:${pct}%"></div></div>
      </div>`;
    });
    html += '</div>';
  }

  if (lb.length > 0) {
    html += `<div class="card"><h3>Top 5</h3>`;
    lb.slice(0,5).forEach((e,i) => {
      const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
      html += `<div class="card-row"><span style="width:30px;font-weight:800">${medal}</span><span style="font-weight:600">${esc(e.name)}</span><span style="margin-left:auto;color:var(--gold);font-weight:700;font-family:'Oswald';font-size:18px">${e.score}</span><span style="color:var(--dim);font-size:12px;margin-left:8px">pts</span></div>`;
    });
    html += '</div>';
  }

  return html;
}

function renderResults() {
  const rounds = [
    {id:"groups",label:"Groups"},{id:"r32",label:"R32"},{id:"r16",label:"R16"},
    {id:"qf",label:"QF"},{id:"sf",label:"Semi"},{id:"final",label:"Final"}
  ];

  let html = `<div class="section-title">Enter Actual Results</div>
  <div style="text-align:center;font-size:12px;color:var(--dim);margin:-10px 0 16px">Enter results as matches are played — player scores update automatically</div>
  <div class="round-tabs">${rounds.map(r =>
    `<button class="tab-btn ${st.resultsRound===r.id?'active':''}" onclick="st.resultsRound='${r.id}';render()">${r.label}</button>`
  ).join('')}</div>`;

  if (st.resultsRound === "groups") html += renderGroupResults();
  else if (st.resultsRound === "final") html += renderFinalResult();
  else html += renderKOResults(st.resultsRound);

  html += `<div style="text-align:center;margin-top:20px"><button class="btn btn-green" onclick="saveResults()">Save All Results</button></div>`;

  return html;
}

function renderGroupResults() {
  let html = `<div style="text-align:center;font-size:11px;color:var(--dim);margin-bottom:14px">Set the final standings for each group (drag or use dropdowns)</div><div class="group-results-grid">`;

  Object.keys(GROUPS).forEach(g => {
    const actual = st.results.groups[g] || [...GROUPS[g]];
    st.results.groups[g] = actual; // ensure initialized

    html += `<div class="group-result-card"><div class="group-result-hdr">Group ${g}</div>`;
    actual.forEach((team, i) => {
      const posClass = `p${i+1}`;
      html += `<div class="result-team-row" draggable="true" ondragstart="gDragStart('${g}',${i},event)" ondragend="gDragEnd(event)" ondragover="gDragOver(event)" ondragleave="gDragLeave(event)" ondrop="gDrop('${g}',${i},event)">
        <div class="pos-badge ${posClass}">${i+1}</div>
        <span>${FLAGS[team]||''} ${esc(team)}</span>
        ${i<2?'<span style="margin-left:auto;font-size:10px;color:var(--gold);font-weight:600">ADV</span>':i===2?'<span style="margin-left:auto;font-size:10px;color:var(--silver);font-weight:600">3RD</span>':''}
      </div>`;
    });
    html += '</div>';
  });

  html += '</div>';
  return html;
}

function renderKOResults(round) {
  const titles = {r32:"Round of 32",r16:"Round of 16",qf:"Quarterfinals",sf:"Semifinals"};
  const matchups = getActualKOMatchups(round);
  const picks = st.results[round] || {};
  const labels = round==="r32"?Array.from({length:16},(_,i)=>`Match ${49+i}`)
    :round==="r16"?Array.from({length:8},(_,i)=>`Match ${65+i}`)
    :round==="qf"?["QF 1","QF 2","QF 3","QF 4"]
    :["Semi-Final 1","Semi-Final 2"];

  let html = `<div style="text-align:center;margin-bottom:14px;font-size:12px;color:var(--dim)">Click the winning team for each match</div><div class="ko-results-grid">`;

  matchups.forEach(([t1,t2], i) => {
    const id = `${round}_${i}`;
    const pick = picks[id];
    const tbd1 = t1==="TBD", tbd2 = t2==="TBD";
    html += `<div class="ko-result-card"><div class="ko-match-label">${labels[i]}</div>
      <div class="ko-team-btn ${pick===t1?'winner':''} ${tbd1?'tbd':''}" onclick="${tbd1?'':`setKOResult('${round}','${id}','${escA(t1)}')`}"><span>${FLAGS[t1]||''} ${esc(t1)}</span>${pick===t1?'<span class="check">✓</span>':''}</div>
      <div class="ko-team-btn ${pick===t2?'winner':''} ${tbd2?'tbd':''}" onclick="${tbd2?'':`setKOResult('${round}','${id}','${escA(t2)}')`}"><span>${FLAGS[t2]||''} ${esc(t2)}</span>${pick===t2?'<span class="check">✓</span>':''}</div>
    </div>`;
  });

  html += '</div>';
  return html;
}

function renderFinalResult() {
  const [t1,t2] = getActualFinalMatchup();
  const pick = st.results.final;
  const tbd1 = t1==="TBD", tbd2 = t2==="TBD";

  let html = `<div style="text-align:center"><div style="display:inline-block"><div class="ko-result-card final-card"><div class="ko-match-label">World Cup Final — MetLife Stadium</div>
    <div class="ko-team-btn ${pick===t1?'winner':''} ${tbd1?'tbd':''}" onclick="${tbd1?'':`st.results.final='${escA(t1)}';render()`}"><span>${FLAGS[t1]||''} ${esc(t1)}</span>${pick===t1?'<span class="check">✓</span>':''}</div>
    <div class="ko-team-btn ${pick===t2?'winner':''} ${tbd2?'tbd':''}" onclick="${tbd2?'':`st.results.final='${escA(t2)}';render()`}"><span>${FLAGS[t2]||''} ${esc(t2)}</span>${pick===t2?'<span class="check">✓</span>':''}</div>
  </div></div>`;

  if (pick) {
    html += `<div style="text-align:center;margin-top:24px"><div style="font-size:52px">🏆</div><div style="font-size:28px;font-weight:700;color:var(--gold);letter-spacing:3px;text-transform:uppercase;font-family:'Oswald'">${FLAGS[pick]||''} ${esc(pick)}</div><div style="font-size:12px;color:var(--dim);margin-top:4px">2026 World Cup Champions</div></div>`;
  }

  html += '</div>';
  return html;
}

function renderBrackets() {
  const lb = st.leaderboard;
  let html = `<div class="section-title">All Brackets (${lb.length})</div>`;

  if (lb.length === 0) {
    html += '<div style="text-align:center;color:var(--dim);padding:40px">No brackets submitted yet.</div>';
    return html;
  }

  html += '<div class="lb-table"><div class="lb-th"><span>#</span><span>Player</span><span>Score</span><span style="text-align:right">Champion</span></div>';
  lb.forEach((entry, i) => {
    html += `<div class="lb-row" onclick="viewUser(${i})"><span class="lb-rank ${i<3?['r1','r2','r3'][i]:'rn'}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</span><span class="lb-name">${esc(entry.name)}</span><span class="lb-score">${entry.score}</span><span class="lb-champ">${FLAGS[entry.bracket?.final]||'—'} ${esc(entry.bracket?.final||'—')}</span></div>`;
  });
  html += '</div>';

  if (st.viewingUser !== null) {
    const entry = lb[st.viewingUser];
    if (entry) {
      html += `<div class="viewer-card"><div class="viewer-hdr"><div><h3 style="font-family:'Oswald';font-size:16px">${esc(entry.name)}'s Bracket — ${entry.score} pts</h3><div style="font-size:12px;color:var(--dim)">Champion: ${FLAGS[entry.bracket?.final]||''} ${esc(entry.bracket?.final||'None')}</div></div><button class="btn btn-outline btn-small" onclick="st.viewingUser=null;render()">Close</button></div>`;

      // Groups comparison
      const userGroups = entry.bracket?.groups || {};
      const actualGroups = st.results.groups || {};
      const hasGroupResults = Object.keys(actualGroups).length > 0;

      if (hasGroupResults) {
        html += `<div class="viewer-round"><div class="viewer-round-title">Group Predictions</div><div class="picks-wrap">`;
        Object.keys(GROUPS).forEach(g => {
          const user = userGroups[g] || [];
          const actual = actualGroups[g] || [];
          user.forEach((team,i) => {
            const isCorrect = actual[i] === team;
            const cls = actual.length > 0 ? (isCorrect ? 'correct' : 'wrong') : '';
            html += `<span class="pick-chip ${cls}">${g}${i+1}: ${FLAGS[team]||''} ${esc(team)}</span>`;
          });
        });
        html += '</div></div>';
      }

      ["r32","r16","qf","sf"].forEach(round => {
        const picks = entry.bracket?.[round] || {};
        const actuals = st.results[round] || {};
        const entries = Object.entries(picks);
        if (entries.length === 0) return;
        const label = round==="r32"?"Round of 32":round==="r16"?"Round of 16":round==="qf"?"Quarterfinals":"Semifinals";
        html += `<div class="viewer-round"><div class="viewer-round-title">${label}</div><div class="picks-wrap">${entries.map(([id,team]) => {
          const actual = actuals[id];
          const cls = actual ? (actual === team ? 'correct' : 'wrong') : '';
          return `<span class="pick-chip ${cls}">${FLAGS[team]||''} ${esc(team)}</span>`;
        }).join('')}</div></div>`;
      });

      // Final
      if (entry.bracket?.final) {
        const cls = st.results.final ? (st.results.final === entry.bracket.final ? 'correct' : 'wrong') : '';
        html += `<div class="viewer-round"><div class="viewer-round-title">Final</div><div class="picks-wrap"><span class="pick-chip ${cls}">🏆 ${FLAGS[entry.bracket.final]||''} ${esc(entry.bracket.final)}</span></div></div>`;
      }

      html += '</div>';
    }
  }

  // Delete player option
  html += `<div class="card" style="margin-top:20px"><h3>Manage Players</h3><div style="font-size:12px;color:var(--dim);margin-bottom:12px">Remove a player's bracket if needed</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <select id="delPlayer" style="flex:1;min-width:150px">${lb.map(e=>`<option value="${esc(e.name)}">${esc(e.name)}</option>`).join('')}</select>
      <button class="btn btn-danger btn-small" onclick="deletePlayer()">Remove Player</button>
    </div>
  </div>`;

  return html;
}

function renderLeaderboardView() {
  const lb = st.leaderboard;
  let html = `<div class="section-title">Leaderboard</div>
  <div style="text-align:center;margin:-10px 0 16px"><button class="btn btn-outline btn-small" onclick="doRefresh()">↻ Refresh Scores</button></div>`;

  if (lb.length === 0) {
    html += '<div style="text-align:center;color:var(--dim);padding:40px">No brackets submitted yet.</div>';
    return html;
  }

  html += '<div class="lb-table"><div class="lb-th"><span>#</span><span>Player</span><span>Score</span><span style="text-align:right">Champion</span></div>';
  lb.forEach((entry, i) => {
    html += `<div class="lb-row"><span class="lb-rank ${i<3?['r1','r2','r3'][i]:'rn'}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</span><span class="lb-name">${esc(entry.name)}</span><span class="lb-score">${entry.score}</span><span class="lb-champ">${FLAGS[entry.bracket?.final]||'—'} ${esc(entry.bracket?.final||'—')}</span></div>`;
  });
  html += '</div>';
  return html;
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function escA(s){return s.replace(/'/g,"\\'")}
function navTo(p){st.page=p;st.viewingUser=null;render()}
function viewUser(i){st.viewingUser=i;render()}

function setKOResult(round, matchId, team) {
  if (!st.results[round]) st.results[round] = {};
  st.results[round][matchId] = team;
  // Clear downstream
  const order = ["r32","r16","qf","sf","final"];
  const idx = order.indexOf(round);
  for (let i = idx+1; i < order.length; i++) {
    if (order[i]==="final") st.results.final = null;
    else st.results[order[i]] = {};
  }
  render();
}

async function deletePlayer() {
  const sel = document.getElementById('delPlayer');
  const name = sel?.value;
  if (!name) return;
  if (!confirm(`Remove ${name}'s bracket? This cannot be undone.`)) return;
  await sDel(`wc26_bracket:${name}`, true);
  await refreshLeaderboard();
  toast(`${name} removed`);
  render();
}

async function doRefresh(){await refreshLeaderboard();toast("Scores refreshed!");render()}

// Group drag & drop
let gDragG=null, gDragI=null;
function gDragStart(g,i,e){gDragG=g;gDragI=i;e.target.style.opacity='0.4'}
function gDragEnd(e){e.target.style.opacity='1';gDragG=null;gDragI=null}
function gDragOver(e){e.preventDefault();e.currentTarget.style.background='rgba(245,200,66,.06)'}
function gDragLeave(e){e.currentTarget.style.background=''}
function gDrop(g,i,e){
  e.currentTarget.style.background='';
  if(gDragG!==g||gDragI===null||gDragI===i)return;
  const arr=st.results.groups[g];
  const[moved]=arr.splice(gDragI,1);arr.splice(i,0,moved);
  // clear downstream knockout results
  st.results.r32={};st.results.r16={};st.results.qf={};st.results.sf={};st.results.final=null;
  render();
}

// Make functions global
window.navTo=navTo;window.viewUser=viewUser;window.setKOResult=setKOResult;
window.deletePlayer=deletePlayer;window.doRefresh=doRefresh;window.saveResults=saveResults;
window.saveDeadline=saveDeadline;window.gDragStart=gDragStart;window.gDragEnd=gDragEnd;
window.gDragOver=gDragOver;window.gDragLeave=gDragLeave;window.gDrop=gDrop;
window.st=st;window.render=render;

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
(async () => {
  // Load saved results
  const savedResults = await sGet("wc26_results", true);
  if (savedResults) st.results = JSON.parse(savedResults);
  // Load deadline
  const savedDeadline = await sGet("wc26_deadline", true);
  if (savedDeadline) st.deadline = savedDeadline;
  // Load leaderboard
  await refreshLeaderboard();
  st.loading = false;
  render();
})();
</script>
